name: Version and Changelog

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

jobs:
  version:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Bump version and sync files
        run: |
          python scripts/version.py "${{ github.event.inputs.bump_type }}"
      
      - name: Commit and push changes
        run: |
          git add .
          git diff --staged --quiet || git commit -m "chore: bump version and update changelog"
          git push
      
      - name: Create and push tag
        run: |
          $tag = "v$env:NEW_VERSION"
          git tag -a $tag -m "Release $env:NEW_VERSION"
          git push origin $tag
