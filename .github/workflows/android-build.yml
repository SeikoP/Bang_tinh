name: Sync Android Submodule

# Android app builds in its own repo: SeikoP/bank-notif
# This workflow only syncs the submodule pointer when bank-notif has new releases

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'bank-notif commit/tag to pin (leave empty for latest main)'
        required: false
        type: string
  schedule:
    # Check for submodule updates daily at 6 AM UTC
    - cron: '0 6 * * *'

concurrency:
  group: android-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Get current submodule SHA
      id: before
      run: |
        CURRENT=$(git -C android_notifier rev-parse HEAD)
        echo "sha=${CURRENT}" >> "$GITHUB_OUTPUT"
        echo "📌 Current submodule: ${CURRENT::7}"

    - name: Update submodule
      run: |
        REF="${{ github.event.inputs.ref }}"
        if [ -n "$REF" ]; then
          echo "📎 Pinning to specific ref: $REF"
          cd android_notifier
          git fetch origin
          git checkout "$REF"
          cd ..
        else
          echo "🔄 Updating to latest main..."
          git submodule update --remote --merge android_notifier
        fi

    - name: Check for changes
      id: check
      run: |
        AFTER=$(git -C android_notifier rev-parse HEAD)
        echo "sha=${AFTER}" >> "$GITHUB_OUTPUT"
        if [ "${{ steps.before.outputs.sha }}" = "$AFTER" ]; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "✅ Submodule already up to date"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "📦 Updated: ${{ steps.before.outputs.sha }}..${AFTER}"
        fi

    - name: Commit and push
      if: steps.check.outputs.changed == 'true'
      run: |
        SHORT_OLD="${{ steps.before.outputs.sha }}"
        SHORT_NEW="${{ steps.check.outputs.sha }}"
        git add android_notifier
        git commit -m "chore: update android_notifier submodule (${SHORT_OLD::7}→${SHORT_NEW::7})"
        git push
