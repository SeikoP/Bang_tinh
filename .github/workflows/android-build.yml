name: Build Android APK (WMS Notifier)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android_notifier/**'
    tags:
      - 'android-v*'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android_notifier/**'
  workflow_dispatch:

permissions:
  contents: write



jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android_notifier/**/*.gradle*', 'android_notifier/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android_notifier
      
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
      working-directory: android_notifier
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WMS-Notifier-APK
        path: android_notifier/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Rolling Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: android-latest
        name: Latest Android Build (WMS Notifier)
        files: android_notifier/app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## WMS Notifier - Android App (Rolling Build)

          Phiên bản build tự động mới nhất từ nhánh `${{ github.ref_name }}`.

          ### 📥 Tải về
          - [Tải app-debug.apk](https://github.com/${{ github.repository }}/releases/download/android-latest/app-debug.apk)

          ### 🛠 Cài đặt
          1. Tải `app-debug.apk` về điện thoại Android
          2. Cài đặt (cho phép cài từ nguồn không rõ nếu được hỏi)
          3. Cấp quyền Notification Listener
          4. Quét mã QR từ màn hình PC để ghép nối

          _Cập nhật lúc: ${{ github.event.head_commit.timestamp }}_
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Versioned Release
      if: startsWith(github.ref, 'refs/tags/android-v')
      uses: softprops/action-gh-release@v1
      with:
        files: android_notifier/app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## WMS Notifier Android App ${{ github.ref_name }}
          
          ### Installation
          1. Download `app-debug.apk`
          2. Install on Android device
          3. Grant notification access
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
