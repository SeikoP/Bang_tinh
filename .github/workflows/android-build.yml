name: Build Android APK (WMS Notifier)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android_notifier/**'
    tags:
      - 'android-v*'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android_notifier/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write



jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android_notifier
      
    - name: Build APK
      run: ./gradlew clean assembleDebug --stacktrace --info --no-daemon
      working-directory: android_notifier

    - name: Upload build reports (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: android-gradle-reports
        path: |
          android_notifier/app/build/reports
          android_notifier/build/reports
        if-no-files-found: ignore
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WMS-Notifier-APK
        path: android_notifier/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Rolling Release
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-latest
        name: Latest Android Build (WMS Notifier)
        files: android_notifier/app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Versioned Release
      if: startsWith(github.ref, 'refs/tags/android-v')
      uses: softprops/action-gh-release@v2
      with:
        files: android_notifier/app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
