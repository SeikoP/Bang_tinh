name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BankNotifier-APK
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Rolling Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: android-latest
        name: Latest Android Build
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## Bank Notifier Android App (Rolling Build)
          
          Bản build tự động mới nhất từ kho lưu trữ Android.
          
          ### 📥 Tải về
          - [Tải app-debug.apk](https://github.com/${{ github.repository }}/releases/download/android-latest/app-debug.apk)
          
          _Cập nhật lúc: ${{ github.event.head_commit.timestamp }}_
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Tagged Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          ## Bank Notifier APK Version ${{ github.ref_name }}
          
          ### Installation
          1. Download `app-debug.apk`
          2. Install APK
          3. Grant notification access permission
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
